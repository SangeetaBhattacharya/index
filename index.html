<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nesso N1 Sensor Logger</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      background: #f6f7f9;
      color: #222;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 18px;
      margin-bottom: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    button {
      padding: 10px 14px;
      margin-right: 8px;
      margin-bottom: 8px;
      border: 0;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .connect {
      background: #0b7;
      color: white;
    }

    .disconnect {
      background: #c33;
      color: white;
    }

    .download {
      background: #246;
      color: white;
    }

    .clear {
      background: #777;
      color: white;
    }

    .status {
      font-weight: bold;
    }

    .last-line {
      font-family: Consolas, monospace;
      background: #eee;
      padding: 8px;
      border-radius: 6px;
      min-height: 22px;
    }

    .error {
      color: #c33;
      font-weight: bold;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      background: white;
    }

    th, td {
      border-bottom: 1px solid #ddd;
      padding: 8px;
      font-size: 14px;
      text-align: left;
    }

    th {
      background: #eef1f5;
      position: sticky;
      top: 0;
    }

    .table-wrap {
      max-height: 520px;
      overflow: auto;
    }
  </style>
</head>

<body>
  <h1>Nesso N1 Sensor Logger</h1>

  <div class="card">
    <button class="connect" onclick="connectSerial()">Connect Serial</button>
    <button class="disconnect" onclick="disconnectSerial()">Disconnect</button>
    <button class="download" onclick="downloadCSV()">Download CSV</button>
    <button class="clear" onclick="clearTable()">Clear Table</button>

    <p>Status: <span id="status" class="status">Not connected</span></p>
    <p>Total readings: <span id="count">0</span></p>

    <p><strong>Last line received:</strong></p>
    <div id="lastLine" class="last-line">Waiting...</div>

    <p id="errorMessage" class="error"></p>
  </div>

  <div class="card">
  <h2>Latest Reading</h2>

  <p><strong>Timestamp:</strong> <span id="latestTimestamp">-</span></p>
  <p><strong>Volume:</strong> <span id="latestVolume">-</span> mL</p>
  <p><strong>Pulses:</strong> <span id="latestPulses">-</span></p>
  <p><strong>Turbidity Raw:</strong> <span id="latestRaw">-</span></p>
  <p><strong>Vout:</strong> <span id="latestVout">-</span></p>
  <p><strong>Vin:</strong> <span id="latestVin">-</span></p>
  <p><strong>Status:</strong> <span id="latestStatus">-</span></p>
</div>
  
  <div class="card">
    <h2>Sensor Readings</h2>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Timestamp</th>
            <th>Volume mL</th>
            <th>Pulses</th>
            <th>Turbidity Raw</th>
            <th>Vout</th>
            <th>Vin</th>
            <th>Status</th>
          </tr>
        </thead>

        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    let port = null;
    let reader = null;
    let keepReading = false;
     let lastSavedMainData = "";
    let lastSavedVolume = "";
    let lastSavedPulses = "";
    let lastSavedStatus = "";
    let lastSavedRaw = "";
    let rawTolerance = 10;   // ignore small turbidity raw changes
    let lastSensorData = "";

    let csvRows = [
      ["timestamp", "volume_ml", "pulses", "turbidity_raw", "vout", "vin", "status"]
    ];

    function setStatus(text, colour) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.style.color = colour;
    }

    function setError(message) {
      document.getElementById("errorMessage").textContent = message || "";
    }

    async function connectSerial() {
      setError("");

      try {
        if (!("serial" in navigator)) {
          setError("Web Serial is not supported. Please use Google Chrome or Microsoft Edge.");
          return;
        }

        port = await navigator.serial.requestPort();

        await port.open({
          baudRate: 115200
        });

        keepReading = true;
        setStatus("Connected", "#0a7");

        readSerial();

      } catch (error) {
        setStatus("Not connected", "#c33");
        setError("Connection error: " + error.message);
      }
    }

    async function readSerial() {
      const decoder = new TextDecoder();
      let buffer = "";

      try {
        reader = port.readable.getReader();

        while (keepReading) {
          const result = await reader.read();

          if (result.done) {
            break;
          }

          if (result.value) {
            buffer += decoder.decode(result.value, { stream: true });

            const lines = buffer.split(/\r?\n/);
            buffer = lines.pop();

            for (const line of lines) {
              processLine(line.trim());
            }
          }
        }

      } catch (error) {
        if (keepReading) {
          setError("Read error: " + error.message);
        }

      } finally {
        if (reader) {
          try {
            reader.releaseLock();
          } catch (e) {}
        }
      }
    }

function processLine(line) {
  if (!line) {
    return;
  }

  document.getElementById("lastLine").textContent = line;

  // Ignore startup/debug messages
  if (!line.includes(",")) {
    return;
  }

  // Ignore CSV header lines
  if (line.toLowerCase().startsWith("time_ms")) {
    return;
  }

  if (line.toLowerCase().startsWith("volume_ml")) {
    return;
  }

  const parts = line.split(",").map(p => p.trim());

  let volume;
  let pulses;
  let raw;
  let vout;
  let vin;
  let clarity;

  // Format without millis:
  // volume_ml,pulses,turbidity_raw,vout,vin,status
  if (parts.length >= 6 && parts.length < 7) {
    volume = parts[0];
    pulses = parts[1];
    raw = parts[2];
    vout = parts[3];
    vin = parts[4];
    clarity = parts[5];
  }

  // Format with millis:
  // time_ms,volume_ml,pulses,turbidity_raw,vout,vin,status
  else if (parts.length >= 7) {
    volume = parts[1];
    pulses = parts[2];
    raw = parts[3];
    vout = parts[4];
    vin = parts[5];
    clarity = parts[6];
  }

  else {
    return;
  }

  // -------------------------------
  // Freeze timestamp unless real data changes
  // -------------------------------

  const currentRaw = Number(raw);

  const currentMainData = volume + "|" + pulses + "|" + clarity;

  const rawDifference =
    lastSavedRaw === "" ? 999999 : Math.abs(currentRaw - Number(lastSavedRaw));

  const sameMainData =
    currentMainData === lastSavedMainData;

  const smallRawChange =
    rawDifference <= rawTolerance;

  // If only timestamp changes, or turbidity raw has tiny noise, do not save/update
  if (sameMainData && smallRawChange) {
    return;
  }

  // This is a real new reading, so now create timestamp
  const timestamp = new Date().toLocaleString();

  lastSavedMainData = currentMainData;
  lastSavedRaw = raw;

  csvRows.push([
    timestamp,
    volume,
    pulses,
    raw,
    vout,
    vin,
    clarity
  ]);

  updateLatestReading(timestamp, volume, pulses, raw, vout, vin, clarity);

  addTableRow(timestamp, volume, pulses, raw, vout, vin, clarity);

  document.getElementById("count").textContent = csvRows.length - 1;
}

    function updateLatestReading(timestamp, volume, pulses, raw, vout, vin, clarity) {
      document.getElementById("latestTimestamp").textContent = timestamp;
      document.getElementById("latestVolume").textContent = volume;
      document.getElementById("latestPulses").textContent = pulses;
      document.getElementById("latestRaw").textContent = raw;
      document.getElementById("latestVout").textContent = vout;
      document.getElementById("latestVin").textContent = vin;
      document.getElementById("latestStatus").textContent = clarity;
    }
    
    function addTableRow(timestamp, volume, pulses, raw, vout, vin, clarity) {
      const tableBody = document.getElementById("tableBody");
      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${timestamp}</td>
        <td>${volume}</td>
        <td>${pulses}</td>
        <td>${raw}</td>
        <td>${vout}</td>
        <td>${vin}</td>
        <td>${clarity}</td>
      `;

      tableBody.prepend(tr);
    }

    async function disconnectSerial() {
      keepReading = false;
      setError("");

      try {
        if (reader) {
          await reader.cancel();
        }

        if (port) {
          await port.close();
        }

        setStatus("Disconnected", "#c33");

      } catch (error) {
        setError("Disconnect error: " + error.message);
      }
    }

    function downloadCSV() {
      const csvContent = csvRows
        .map(row => row.map(value => `"${String(value).replace(/"/g, '""')}"`).join(","))
        .join("\n");

      const blob = new Blob([csvContent], {
        type: "text/csv;charset=utf-8;"
      });

      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "urine_readings.csv";
      a.click();

      URL.revokeObjectURL(url);
    }

    function clearTable() {
      if (!confirm("Clear all readings from the table?")) {
        return;
      }

      csvRows = [
        ["timestamp", "volume_ml", "pulses", "turbidity_raw", "vout", "vin", "status"]
      ];

      document.getElementById("tableBody").innerHTML = "";
      document.getElementById("count").textContent = "0";
      document.getElementById("lastLine").textContent = "Waiting...";
      lastSavedMainData = "";
lastSavedRaw = "";
    }
  </script>
</body>
</html>
